# FILE SUMMARY:
# This Docker Compose file orchestrates the local deployment of the DevOps Lab.
# It defines two services: 
# 1. 'web': The Flask application (built from the local Dockerfile).
# 2. 'redis': The database for tracking visits.
# It also configures a private bridge network for secure service-to-service communication.

services:
  # The Flask application service
  web:
    # Build the image using the Dockerfile in the current directory
    build: .
    # Explicitly name and tag the built image
    image: devops-lab-app:1.0.0
    ports:
      # Map container port 5000 to host port 5000
      - "5000:5000"
    # Pass environment variables for database connection
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    # Resource management (useful for Docker Desktop/Swarm)
    deploy:
      resources:
        # Upper bound for CPU and Memory
        limits:
          cpus: '0.5'
          memory: 256M
        # Minimum guaranteed resources
        reservations:
          cpus: '0.25'
          memory: 128M
    # Ensure the app is responsive before marking as healthy
    # We now use the dedicated /health endpoint
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Wait for redis to be healthy before starting the web app
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - lab-network

  # The Redis database service
  redis:
    # Use a lightweight, stable Redis image
    image: "redis:alpine"
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
    # Ensure Redis is ready to accept connections
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lab-network

networks:
  # Custom bridge network for isolated service communication
  lab-network:
    driver: bridge

