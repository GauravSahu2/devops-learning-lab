# FILE SUMMARY:
# This GitHub Actions workflow automates the CI/CD pipeline.
# It performs security scans (Bandit, Gitleaks, Hadolint),
# builds the Docker image, and scans it for vulnerabilities using Trivy.

name: CI/CD Pipeline # The name of the GitHub Actions workflow
 
on: # Defines the events that trigger the workflow
  push: # Triggers on a 'push' event
    branches: [ main ] # Only triggers for the 'main' branch
  pull_request: # Triggers on a 'pull_request' event
    branches: [ main ] # Only triggers for pull requests targeting 'main'
 
jobs: # Container for all the jobs that run in the workflow
  security-and-lint: # ID for the first job: Security and Linting
    runs-on: ubuntu-latest # The type of virtual machine to run the job on
    steps: # List of sequential tasks (steps) to execute
      - uses: actions/checkout@v3 # Official action to check out the repository code
 
      # 1. SAST - Python Security Scan
      - name: Run Bandit (Python Security) # Task name for logging
        run: | # Executes multi-line shell commands
          pip install bandit # Installs Bandit, a tool for finding common security issues in Python
          bandit -r ./app # Runs Bandit recursively on the 'app' directory
 
      # 2. Dockerfile Linting
      - name: Hadolint Dockerfile check # Task name for logging
        uses: hadolint/hadolint-action@v3.1.0 # External action to lint the Dockerfile
        with: # Input parameters for the action
          dockerfile: Dockerfile # Path to the Dockerfile to lint
 
      # 3. Secret Scanning (Prevention)
      - name: Gitleaks scan # Task name for logging
        uses: gitleaks/gitleaks-action@v2 # External action to scan for hardcoded secrets
        env: # Environment variables for the action
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Auth token to allow the action to comment on PRs
 
  build-and-scan: # ID for the second job: Build and Vulnerability Scanning
    needs: security-and-lint # Ensures this job only runs if the 'security-and-lint' job succeeds
    runs-on: ubuntu-latest # The type of virtual machine to run the job on
    steps: # List of steps for this job
      - uses: actions/checkout@v3 # Checks out the code
 
      # 4. Build Docker Image
      - name: Build Docker image # Task name for logging
        run: docker build -t devops-lab-app:${{ github.sha }} . # Builds the image using the git commit SHA as a tag
 
      # 5. Image Vulnerability Scanning
      - name: Run Trivy vulnerability scanner # Task name for logging
        uses: aquasecurity/trivy-action@master # External action to scan Docker images for vulnerabilities
        with: # Input parameters for the action
          image-ref: 'devops-lab-app:${{ github.sha }}' # The image to scan
          format: 'table' # Output format (human-readable table)
          exit-code: '1' # Fail the pipeline if vulnerabilities are found (return non-zero exit code)
          ignore-unfixed: true # Skip vulnerabilities that don't have a fix yet
          severity: 'CRITICAL,HIGH' # Only fail on Critical and High severity issues
 
  deploy-mock: # ID for the third job: Simulated Deployment
    needs: build-and-scan # Ensures this job only runs if the 'build-and-scan' job succeeds
    runs-on: ubuntu-latest # The type of virtual machine to run the job on
    steps: # List of steps for this job
      - name: Mock Deployment # Task name for logging
        run: | # Executes multi-line shell commands to simulate deployment
          echo "Security checks passed!" # Status message
          echo "Image built and scanned!" # Status message
          echo "Deploying to Kubernetes cluster (Simulated)..." # Status message
          echo "kubectl apply -f k8s/" # Mock command showing how deployment would happen

