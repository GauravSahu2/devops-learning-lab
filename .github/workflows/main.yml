# FILE SUMMARY:
# This GitHub Actions workflow automates the CI/CD pipeline.
# It performs security scans (Bandit, Gitleaks, Hadolint),
# builds the Docker image, and scans it for vulnerabilities using Trivy.

# The name of the GitHub Actions workflow
name: CI/CD Pipeline
 
# Defines the events that trigger the workflow
on:
  # Triggers on a 'push' event
  push:
    # Only triggers for the 'master' branch
    branches: [ master ]
  # Triggers on a 'pull_request' event
  pull_request:
    # Only triggers for pull requests targeting 'master'
    branches: [ master ]
 
# Container for all the jobs that run in the workflow
jobs:
  # ID for the first job: Security and Linting
  security-and-lint:
    # The type of virtual machine to run the job on
    runs-on: ubuntu-latest
    # List of sequential tasks (steps) to execute
    steps:
      # Official action to check out the repository code
      - uses: actions/checkout@v3
 
      # 1. SAST - Python Security Scan
      # Task name for logging
      - name: Run Bandit (Python Security)
        # Executes multi-line shell commands
        run: |
          # Installs Bandit, a tool for finding common security issues in Python
          pip install bandit
          # Runs Bandit recursively on the 'app' directory
          bandit -r ./app
 
      # 2. Dockerfile Linting
      # Task name for logging
      - name: Hadolint Dockerfile check
        # External action to lint the Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        # Input parameters for the action
        with:
          # Path to the Dockerfile to lint
          dockerfile: Dockerfile
 
      # 3. Secret Scanning (Prevention)
      # Task name for logging
      - name: Gitleaks scan
        # External action to scan for hardcoded secrets
        uses: gitleaks/gitleaks-action@v2
        # Environment variables for the action
        env:
          # Auth token to allow the action to comment on PRs
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
 
  # ID for the second job: Build and Vulnerability Scanning
  build-and-scan:
    # Ensures this job only runs if the 'security-and-lint' job succeeds
    needs: security-and-lint
    # The type of virtual machine to run the job on
    runs-on: ubuntu-latest
    # List of steps for this job
    steps:
      # Checks out the code
      - uses: actions/checkout@v3
 
      # 4. Build Docker Image
      # Task name for logging
      - name: Build Docker image
        # Builds the image using the git commit SHA as a tag
        run: docker build -t devops-lab-app:${{ github.sha }} .
 
      # 5. Image Vulnerability Scanning
      # Task name for logging
      - name: Run Trivy vulnerability scanner
        # External action to scan Docker images for vulnerabilities
        uses: aquasecurity/trivy-action@master
        # Input parameters for the action
        with:
          # The image to scan
          image-ref: 'devops-lab-app:${{ github.sha }}'
          # Output format (human-readable table)
          format: 'table'
          # Fail the pipeline if vulnerabilities are found (return non-zero exit code)
          exit-code: '1'
          # Skip vulnerabilities that don't have a fix yet
          ignore-unfixed: true
          # Only fail on Critical and High severity issues
          severity: 'CRITICAL,HIGH'
 
  # ID for the third job: Simulated Deployment
  deploy-mock:
    # Ensures this job only runs if the 'build-and-scan' job succeeds
    needs: build-and-scan
    # The type of virtual machine to run the job on
    runs-on: ubuntu-latest
    # List of steps for this job
    steps:
      # Task name for logging
      - name: Mock Deployment
        # Executes multi-line shell commands to simulate deployment
        run: |
          # Status message
          echo "Security checks passed!"
          # Status message
          echo "Image built and scanned!"
          # Status message
          echo "Deploying to Kubernetes cluster (Simulated)..."
          # Mock command showing how deployment would happen
          echo "kubectl apply -f k8s/"

