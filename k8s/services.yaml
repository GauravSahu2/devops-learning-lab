# FILE SUMMARY:
# This file defines the Kubernetes Services for the project.
# 1. flask-service: Exposes the web app externally via a LoadBalancer.
# 2. redis-service: Provides an internal cluster IP/DNS for the Redis database.

# Service for the Flask App (Exposed externally)
# API version for the Service resource
apiVersion: v1
# Defines the resource as a Service
kind: Service
# Metadata for the Service
metadata:
  # Name used to access this service within the cluster
  name: flask-service
# Specification for the Service
spec:
  # Exposes the service externally using a cloud provider's load balancer
  type: LoadBalancer
  # Matches pods with these labels
  selector:
    # Routes traffic to pods with label app=flask-app
    app: flask-app
  # Port configuration
  ports:
    # Network protocol used
    - protocol: TCP
      # Port exposed by the Service (external)
      port: 80
      # Port on the container to forward traffic to
      targetPort: 5000

---
# Service for Redis (Internal only)
# API version for the Service resource
apiVersion: v1
# Defines the resource as a Service
kind: Service
# Metadata for the Service
metadata:
  # DNS name for internal cluster communication (used by flask-app)
  name: redis-service
# Specification for the Service
spec:
  # Matches pods with these labels
  selector:
    # Routes traffic to pods with label app=redis
    app: redis
  # Port configuration
  ports:
    # Network protocol used
    - protocol: TCP
      # Port exposed by the Service (external)
      port: 6379
      # Port on the Redis container
      targetPort: 6379

