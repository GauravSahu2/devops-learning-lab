# FILE SUMMARY:
# This Deployment file manages the Redis instance for the application.
# It runs a single instance of Redis using a lightweight Alpine image.

# Specifies the API version for the Deployment resource
apiVersion: apps/v1
# Defines the type of resource being created
kind: Deployment
# Metadata for the Deployment
metadata:
  # Unique name of the Redis Deployment
  name: redis
  # Labels for identifying the deployment
  labels:
    # Custom label: app=redis
    app: redis
# Specification of the desired state
spec:
  # Only 1 replica for Redis (standard for non-HA setups)
  replicas: 1
  # Defines how the Deployment finds which pods to manage
  selector:
    # Labels that pods must have to be managed by this Deployment
    matchLabels:
      # Must match the pod template label
      app: redis
  # Template for the Redis pod
  template:
    # Metadata for the Redis pod
    metadata:
      # Labels applied to the Redis pod
      labels:
        # Label used by the selector and service
        app: redis
    # Specification for the Redis container
    spec:
      # Security: Don't automatically mount the default service account token
      automountServiceAccountToken: false
      # List of containers in the pod
      containers:
      - name: redis
        # Lightweight Alpine-based Redis image
        image: redis:alpine
        # Resource requests and limits for stability
        resources:
          limits:
            cpu: "100m"
            memory: "128Mi"
          requests:
            cpu: "50m"
            memory: "64Mi"
            # Requested ephemeral storage for logs/scratch space
            ephemeral-storage: "1Gi"
        # Ports to expose
        ports:
        # Standard Redis port
        - containerPort: 6379

